<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <filter id="glow-v">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- OUTER RING: Investigate -->
  <circle cx="240" cy="240" r="210" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="4 8"/>
  <path d="M 240 30 A 210 210 0 0 1 405 144" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.7" filter="url(#glow-v)">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite" begin="0s"/>
  </path>
  <text x="420" y="120" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="rgba(255,255,255,0.45)" letter-spacing="2">INVESTIGATE</text>

  <!-- MIDDLE RING: Delegate + Remember -->
  <circle cx="240" cy="240" r="170" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="6 12"/>
  <path d="M 410 240 A 170 170 0 0 1 240 410" fill="none" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" opacity="0.55">
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="4s" repeatCount="indefinite" begin="1s"/>
  </path>
  <text x="420" y="248" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="rgba(255,255,255,0.45)" letter-spacing="2">DELEGATE</text>

  <path d="M 240 410 A 170 170 0 0 1 70 240" fill="none" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" opacity="0.55">
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="4s" repeatCount="indefinite" begin="2s"/>
  </path>
  <text x="60" y="248" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="rgba(255,255,255,0.45)" letter-spacing="2" text-anchor="end">REMEMBER</text>

  <!-- INNER RING: Challenge -->
  <circle cx="240" cy="240" r="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="3 9"/>
  <path d="M 70 240 A 130 130 0 0 1 240 110" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite" begin="3s"/>
  </path>
  <text x="60" y="128" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="rgba(255,255,255,0.45)" letter-spacing="2" text-anchor="end">CHALLENGE</text>

  <!-- CENTER: Verify -->
  <circle cx="240" cy="240" r="90" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="1"/>
  <text x="240" y="160" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(255,255,255,0.55)" letter-spacing="3">VERIFY</text>
  <circle cx="240" cy="240" r="18" fill="url(#coreGrad)"/>
  <circle cx="240" cy="240" r="4" fill="#8B5CF6" filter="url(#glow-strong)">
    <animate attributeName="r" values="4;6;4" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Connecting neural lines between rings -->
  <g stroke="rgba(139,92,246,0.08)" stroke-width="0.6">
    <!-- Outer to middle connections -->
    <line x1="405" y1="144" x2="355" y2="195"/>
    <line x1="240" y1="30" x2="240" y2="70"/>
    <line x1="75" y1="144" x2="125" y2="195"/>
    <!-- Middle to inner connections -->
    <line x1="410" y1="240" x2="355" y2="240"/>
    <line x1="240" y1="410" x2="240" y2="355"/>
    <line x1="70" y1="240" x2="125" y2="240"/>
    <!-- Inner to center connections -->
    <line x1="240" y1="110" x2="240" y2="168"/>
    <line x1="370" y1="240" x2="310" y2="240"/>
    <line x1="110" y1="240" x2="170" y2="240"/>
  </g>

  <!-- Neural nodes at intersections -->
  <g fill="#8B5CF6" opacity="0.5">
    <circle cx="405" cy="144" r="3"/>
    <circle cx="410" cy="240" r="3"/>
    <circle cx="240" cy="410" r="3"/>
    <circle cx="70" cy="240" r="3"/>
    <circle cx="75" cy="144" r="3"/>
    <circle cx="355" cy="195" r="2.5"/>
    <circle cx="240" cy="70" r="2.5"/>
    <circle cx="125" cy="195" r="2.5"/>
    <circle cx="355" cy="240" r="2.5"/>
    <circle cx="240" cy="355" r="2.5"/>
    <circle cx="125" cy="240" r="2.5"/>
    <circle cx="240" cy="168" r="2.5"/>
    <circle cx="310" cy="240" r="2.5"/>
    <circle cx="170" cy="240" r="2.5"/>
  </g>

  <!-- Subtle dotted outer perimeter -->
  <circle cx="240" cy="240" r="225" fill="none" stroke="rgba(139,92,246,0.04)" stroke-width="0.8" stroke-dasharray="2 8"/>
</svg>