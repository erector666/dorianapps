<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0A0C10"/>
      <stop offset="100%" stop-color="#070808"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D8CFF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF3B5C"/>
    </linearGradient>
    <filter id="glow-og">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle geometric lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Neural core hint (subtle concentric circles) -->
  <circle cx="600" cy="280" r="180" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8" stroke-dasharray="3 10"/>
  <circle cx="600" cy="280" r="260" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5" stroke-dasharray="2 14"/>

  <!-- Accent dot at center -->
  <circle cx="600" cy="280" r="4" fill="#8B5CF6" opacity="0.6" filter="url(#glow-og)"/>

  <!-- Logo text: DORIAN APPS -->
  <text x="600" y="240" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700" fill="#F5F5F7" letter-spacing="12">DORIAN APPS</text>

  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="6">SYSTEMS · PRODUCTS · AGENTS</text>

  <!-- Accent line below -->
  <rect x="520" y="330" width="160" height="2" rx="1" fill="url(#accentLine)" opacity="0.7"/>

  <!-- URL footer -->
  <text x="600" y="580" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="4">DORIANAPPS.COM</text>

  <!-- Corner ornaments -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="60" y1="40" x2="60" y2="80"/>
    <line x1="60" y1="40" x2="100" y2="40"/>
    <line x1="1140" y1="40" x2="1140" y2="80"/>
    <line x1="1140" y1="40" x2="1100" y2="40"/>
  </g>
</svg>