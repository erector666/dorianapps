<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!--
    AS-036 — Logo Lockup
    Dorian Apps brand identity
    D/A monogram (AS-035) + "DORIAN" wordmark
    Spec: 6:1 ratio (480×80 viewBox)
    Font: Switzer Medium 500 → 'Inter', 'Switzer', system-ui, sans-serif
    No gradients, no accent dot, no "APPS" sub-text
    Off-white (#EBEBED) wordmark, currentColor on monogram
    Letter-spacing: 0.15em on wordmark
    Created: 2026-07-20
    Operator: Sam (Hermes Agent)
    Tool: Hand-crafted SVG (rebuilt from spec)
  -->
  <!-- D/A Monogram Mark (AS-035 geometry, unscaled in 64×64 area) -->
  <g transform="translate(8, 8)" color="#EBEBED">
    <!-- D: vertical bar -->
    <path d="M 10,6 L 10,58" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
    <!-- D: arch -->
    <path d="M 10,6 Q 54,6 54,32 Q 54,58 10,58" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
    <!-- A: left diagonal -->
    <path d="M 14,58 L 34,8" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
    <!-- A: right diagonal -->
    <path d="M 54,58 L 34,8" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
    <!-- A: crossbar -->
    <path d="M 22,38 L 46,38" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  </g>
  <!-- "DORIAN" Wordmark -->
  <text
    x="88"
    y="52"
    fill="#EBEBED"
    font-family="'Inter', 'Switzer', system-ui, -apple-system, sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="0.15em"
  >DORIAN</text>
</svg>
