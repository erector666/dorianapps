<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" width="240" height="40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#C8C8CC"/>
    </linearGradient>
  </defs>

  <!-- Geometric monogram: interlocking D and A -->
  <!-- D -->
  <path d="M 2 4 L 2 36 L 18 36 C 30 36 34 28 34 20 C 34 12 30 4 18 4 Z" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 22 4 L 38 36" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 14 4 L 30 34" fill="none" stroke="url(#logoGrad)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Wordmark "DORIAN" in Playfair-style lettering -->
  <text x="52" y="29" font-family="'Playfair Display', Georgia, serif" font-size="24" font-weight="700" fill="#F5F5F7" letter-spacing="4">DORIAN</text>

  <!-- Accent dot at the end -->
