<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle outline -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Orbit arc segments -->
  <!-- Segment 1: INVESTIGATE (top-right, 0-72°) -->
  <path d="M 160 20 A 140 140 0 0 1 280.2 115.5" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.8" filter="url(#glow)">
    <animate attributeName="opacity" values="0.15;0.8;0.15" dur="3s" repeatCount="indefinite" begin="0s"/>
  </path>

  <!-- Segment 2: DELEGATE (bottom-right, 72-144°) -->
  <path d="M 280.2 115.5 A 140 140 0 0 1 280.2 204.5" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.15;0.6;0.15" dur="3s" repeatCount="indefinite" begin="0.6s"/>
  </path>

  <!-- Segment 3: REMEMBER (bottom-left, 144-216°) -->
  <path d="M 280.2 204.5 A 140 140 0 0 1 160 300" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.15;0.6;0.15" dur="3s" repeatCount="indefinite" begin="1.2s"/>
  </path>

  <!-- Segment 4: CHALLENGE (top-left, 216-288°) -->
  <path d="M 160 300 A 140 140 0 0 1 39.8 204.5" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.15;0.6;0.15" dur="3s" repeatCount="indefinite" begin="1.8s"/>
  </path>

  <!-- Segment 5: VERIFY (top-left to top-right, 288-360°) -->
  <path d="M 39.8 204.5 A 140 140 0 0 1 39.8 115.5 L 39.8 115.5" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.15;0.6;0.15" dur="3s" repeatCount="indefinite" begin="2.4s"/>
  </path>

  <!-- Node dots at segment boundaries -->
  <circle cx="160" cy="20" r="3" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="280.2" cy="115.5" r="3" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="280.2" cy="204.5" r="3" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="160" cy="300" r="3" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="39.8" cy="204.5" r="3" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="39.8" cy="115.5" r="3" fill="#8B5CF6" opacity="0.8"/>

  <!-- Connecting lines from nodes to center -->
  <line x1="160" y1="20" x2="160" y2="160" stroke="rgba(139,92,246,0.12)" stroke-width="0.8"/>
  <line x1="280.2" y1="115.5" x2="160" y2="160" stroke="rgba(139,92,246,0.12)" stroke-width="0.8"/>
  <line x1="280.2" y1="204.5" x2="160" y2="160" stroke="rgba(139,92,246,0.12)" stroke-width="0.8"/>
  <line x1="160" y1="300" x2="160" y2="160" stroke="rgba(139,92,246,0.12)" stroke-width="0.8"/>
  <line x1="39.8" y1="204.5" x2="160" y2="160" stroke="rgba(139,92,246,0.12)" stroke-width="0.8"/>
  <line x1="39.8" y1="115.5" x2="160" y2="160" stroke="rgba(139,92,246,0.12)" stroke-width="0.8"/>

  <!-- Central memory node -->
  <circle cx="160" cy="160" r="24" fill="url(#coreGrad)"/>
  <circle cx="160" cy="160" r="5" fill="#8B5CF6">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Labels around perimeter -->
  <text x="160" y="10" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">INVESTIGATE</text>
  <text x="296" y="118" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">DELEGATE</text>
  <text x="296" y="210" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">REMEMBER</text>
  <text x="160" y="316" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">CHALLENGE</text>
  <text x="24" y="210" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">VERIFY</text>

  <!-- Subtle outer rings -->
  <circle cx="160" cy="160" r="148" fill="none" stroke="rgba(139,92,246,0.06)" stroke-width="0.5"/>
  <circle cx="160" cy="160" r="132" fill="none" stroke="rgba(139,92,246,0.06)" stroke-width="0.5"/>
</svg>