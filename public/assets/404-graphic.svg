<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="acc-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Broken orbital ring -->
  <!-- Gap 1: top-left arc missing -->
  <!-- Remaining arcs -->
  <path d="M 200 40 A 160 160 0 0 1 360 200" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 360 200 A 160 160 0 0 1 130 355" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 130 355 A 160 160 0 0 1 40 200" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 40 200 A 160 160 0 0 1 180 42" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Accent-colored broken fragments -->
  <path d="M 200 35 A 165 165 0 0 1 280 60" fill="none" stroke="#2D8CFF" stroke-width="2.5" stroke-linecap="round" filter="url(#acc-glow)"/>
  <path d="M 365 200 A 165 165 0 0 1 350 260" fill="none" stroke="#FF3B5C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Inner connecting fragments -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" stroke-dasharray="8 16"/>

  <!-- Fragments turning slowly -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite"/>
    <line x1="200" y1="110" x2="200" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="290" y1="200" x2="310" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="200" y1="270" x2="200" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="90" y1="200" x2="110" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>

  <!-- Center node -->
  <circle cx="200" cy="200" r="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="200" cy="200" r="3" fill="#2D8CFF" opacity="0.7"/>

  <!-- 404 text integrated -->
  <text x="200" y="330" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="700" fill="#F5F5F7" letter-spacing="8">404</text>
  <text x="200" y="362" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="3">SIGNAL LOST</text>
</svg>