<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!--
    AS-018 — Hero Diagram: BEFORE state
    Spreadsheet chaos — disconnected, manual, overlapping
    Split from hero-diagram.svg for two-state animation
    Created: 2026-07-20
    Operator: Sam (Hermes Agent)
  -->
  <defs>
    <linearGradient id="chaosBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="600" fill="url(#chaosBg)"/>

  <!-- BEFORE label -->
  <text x="300" y="40" text-anchor="middle" fill="#888" font-family="monospace" font-size="14" letter-spacing="3">BEFORE</text>

  <!-- Chaos elements: spreadsheet grid -->
  <g transform="translate(40, 70) rotate(-8)">
    <rect x="0" y="0" width="160" height="120" fill="none" stroke="#444" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="30" x2="160" y2="30" stroke="#444" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="60" x2="160" y2="60" stroke="#444" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="90" x2="160" y2="90" stroke="#444" stroke-width="0.5" opacity="0.5"/>
    <line x1="40" y1="0" x2="40" y2="120" stroke="#444" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="0" x2="80" y2="120" stroke="#444" stroke-width="0.5" opacity="0.5"/>
    <line x1="120" y1="0" x2="120" y2="120" stroke="#444" stroke-width="0.5" opacity="0.5"/>
    <text x="5" y="22" fill="#666" font-family="monospace" font-size="9">42</text>
    <text x="45" y="22" fill="#666" font-family="monospace" font-size="9">17.5</text>
    <text x="5" y="52" fill="#666" font-family="monospace" font-size="9">N/A</text>
    <text x="85" y="52" fill="#666" font-family="monospace" font-size="9">err</text>
  </g>

  <!-- Chaos: document icon -->
  <g transform="translate(55, 230) rotate(12)">
    <rect x="0" y="0" width="90" height="110" fill="#222" stroke="#555" stroke-width="1.5" rx="3" opacity="0.7"/>
    <line x1="12" y1="22" x2="78" y2="22" stroke="#555" stroke-width="2"/>
    <line x1="12" y1="34" x2="60" y2="34" stroke="#555" stroke-width="1.5"/>
    <line x1="12" y1="46" x2="72" y2="46" stroke="#555" stroke-width="1.5"/>
    <line x1="12" y1="58" x2="50" y2="58" stroke="#555" stroke-width="1.5"/>
    <line x1="12" y1="70" x2="68" y2="70" stroke="#555" stroke-width="1.5"/>
    <rect x="70" y="0" width="20" height="18" fill="#333" stroke="#555" stroke-width="1" rx="2"/>
    <text x="75" y="13" fill="#777" font-family="sans-serif" font-size="9" text-anchor="middle">PDF</text>
  </g>

  <!-- Chaos: email thread -->
  <g transform="translate(310, 60) rotate(5)">
    <rect x="0" y="0" width="200" height="140" fill="#1a1a1a" stroke="#444" stroke-width="1" rx="4" opacity="0.7"/>
    <rect x="8" y="8" width="24" height="18" fill="none" stroke="#666" stroke-width="1.5" rx="1"/>
    <line x1="8" y1="8" x2="20" y2="20" stroke="#666" stroke-width="1"/>
    <line x1="32" y1="8" x2="20" y2="20" stroke="#666" stroke-width="1"/>
    <text x="40" y="17" fill="#666" font-family="sans-serif" font-size="9">RE: Budget update</text>
    <text x="40" y="30" fill="#555" font-family="monospace" font-size="8">From: ops@...</text>
    <line x1="8" y1="38" x2="192" y2="38" stroke="#333" stroke-width="0.5"/>
    <text x="8" y="52" fill="#555" font-family="monospace" font-size="8">FYI the numbers in</text>
    <text x="8" y="64" fill="#555" font-family="monospace" font-size="8">the spreadsheet do not</text>
    <text x="8" y="76" fill="#555" font-family="monospace" font-size="8">match what we discussed.</text>
    <text x="8" y="88" fill="#555" font-family="monospace" font-size="8">Can you send the</text>
    <text x="8" y="100" fill="#555" font-family="monospace" font-size="8">latest version?</text>
    <line x1="8" y1="112" x2="192" y2="112" stroke="#333" stroke-width="0.5"/>
    <text x="8" y="126" fill="#777" font-family="sans-serif" font-size="8">3 replies, 2 unread</text>
  </g>

  <!-- Chaos: chat bubble -->
  <g transform="translate(60, 370) rotate(-15)">
    <path d="M0,0 Q0,-50 50,-50 L150,-50 Q200,-50 200,0 L200,30 Q200,60 180,60 L80,60 L40,85 L45,55 L0,55 Q-30,55 0,25 Z" fill="#1a1a1a" stroke="#444" stroke-width="1.5" opacity="0.7"/>
    <text x="100" y="-20" fill="#666" font-family="sans-serif" font-size="10" text-anchor="middle">@channel: where is</text>
    <text x="100" y="-5" fill="#666" font-family="sans-serif" font-size="10" text-anchor="middle">the latest report?</text>
  </g>

  <!-- Chaos: small card -->
  <g transform="translate(280, 350) rotate(-22)">
    <rect x="0" y="0" width="70" height="50" fill="#1e1e1e" stroke="#555" stroke-width="1" rx="2" opacity="0.5"/>
    <line x1="10" y1="15" x2="60" y2="15" stroke="#555" stroke-width="1"/>
    <line x1="10" y1="25" x2="50" y2="25" stroke="#555" stroke-width="1"/>
    <line x1="10" y1="35" x2="55" y2="35" stroke="#555" stroke-width="1"/>
  </g>

  <!-- Chaos connections (dashed lines) -->
  <path d="M200,130 C230,150 250,120 290,120" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <path d="M150,300 C180,380 150,400 90,400" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <path d="M250,410 C330,380 380,300 420,200" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <path d="M350,250 C320,350 400,450 300,460" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,5" opacity="0.3"/>

  <!-- Question marks -->
  <text x="240" y="180" fill="#f59e0b" font-family="sans-serif" font-size="22" opacity="0.4" transform="rotate(-10, 240, 180)">?</text>
  <text x="400" y="370" fill="#f59e0b" font-family="sans-serif" font-size="18" opacity="0.3" transform="rotate(8, 400, 370)">?</text>

  <!-- Right edge indicator / transition hint -->
  <line x1="590" y1="40" x2="590" y2="560" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
</svg>