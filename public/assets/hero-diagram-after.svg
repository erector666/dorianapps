<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!--
    AS-018 — Hero Diagram: AFTER state
    Systematic pipeline — automated, precise, connected
    Split from hero-diagram.svg for two-state animation
    Created: 2026-07-20
    Operator: Sam (Hermes Agent)
  -->
  <defs>
    <linearGradient id="pipelineBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e13"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPipeline" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="600" fill="url(#pipelineBg)"/>

  <!-- AFTER label -->
  <text x="300" y="40" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="14" letter-spacing="3" filter="url(#glow)">AFTER</text>

  <!-- Pipeline node: Data Source (shifted from x=630 to x=30) -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="130" height="80" fill="#1a2332" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
    <text x="65" y="30" fill="#ccc" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Data Source</text>
    <rect x="20" y="45" width="18" height="18" fill="#1e2a3a" stroke="#555" stroke-width="0.5" rx="2"/>
    <line x1="23" y1="50" x2="35" y2="50" stroke="#888" stroke-width="1"/>
    <line x1="23" y1="55" x2="32" y2="55" stroke="#888" stroke-width="1"/>
    <rect x="48" y="45" width="18" height="18" fill="#1e2a3a" stroke="#555" stroke-width="0.5" rx="2"/>
    <text x="57" y="58" fill="#888" font-family="sans-serif" font-size="8" text-anchor="middle">@</text>
    <rect x="76" y="45" width="18" height="18" fill="#1e2a3a" stroke="#555" stroke-width="0.5" rx="2"/>
    <text x="85" y="58" fill="#888" font-family="sans-serif" font-size="9" text-anchor="middle">D</text>
    <rect x="104" y="45" width="18" height="18" fill="#1e2a3a" stroke="#555" stroke-width="0.5" rx="2"/>
    <text x="113" y="58" fill="#888" font-family="sans-serif" font-size="9" text-anchor="middle">C</text>
  </g>

  <!-- Arrow: Data Source to Processing (shifted from x=760→160, x=810→210) -->
  <line x1="160" y1="140" x2="210" y2="140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowPipeline)"/>

  <!-- Pipeline node: Processing (shifted from x=815 to x=215) -->
  <g transform="translate(215, 100)">
    <rect x="0" y="0" width="130" height="80" fill="#1a2332" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
    <text x="65" y="30" fill="#ccc" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Processing</text>
    <circle cx="50" cy="56" r="12" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <circle cx="50" cy="56" r="5" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="38" y1="49" x2="62" y2="63" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    <line x1="62" y1="49" x2="38" y2="63" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    <text x="100" y="60" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.8">+AI</text>
  </g>

  <!-- Arrow: Processing to Structured Output (shifted from x=945→345, x=995→395) -->
  <line x1="345" y1="140" x2="395" y2="140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowPipeline)"/>

  <!-- Pipeline node: Structured Output (shifted from x=630 to x=30) -->
  <g transform="translate(30, 230)">
    <rect x="0" y="0" width="130" height="80" fill="#1a2332" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
    <text x="65" y="28" fill="#ccc" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Structured</text>
    <text x="65" y="43" fill="#ccc" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Output</text>
    <text x="42" y="66" fill="#f59e0b" font-family="monospace" font-size="12" opacity="0.7">{</text>
    <text x="57" y="66" fill="#aaa" font-family="monospace" font-size="8">...</text>
    <text x="72" y="66" fill="#f59e0b" font-family="monospace" font-size="12" opacity="0.7">}</text>
    <rect x="88" y="54" width="24" height="18" fill="none" stroke="#aaa" stroke-width="0.5" rx="1"/>
    <line x1="88" y1="60" x2="112" y2="60" stroke="#aaa" stroke-width="0.5"/>
    <line x1="88" y1="66" x2="112" y2="66" stroke="#aaa" stroke-width="0.5"/>
    <line x1="96" y1="54" x2="96" y2="72" stroke="#aaa" stroke-width="0.5"/>
  </g>

  <!-- Pipeline node: Dashboard (shifted from x=815 to x=215) -->
  <g transform="translate(215, 230)">
    <rect x="0" y="0" width="130" height="80" fill="#1a2332" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
    <text x="65" y="30" fill="#ccc" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Dashboard</text>
    <rect x="30" y="62" width="8" height="12" fill="#f59e0b" opacity="0.5"/>
    <rect x="42" y="50" width="8" height="24" fill="#f59e0b" opacity="0.6"/>
    <rect x="54" y="44" width="8" height="30" fill="#f59e0b" opacity="0.7"/>
    <rect x="66" y="55" width="8" height="19" fill="#f59e0b" opacity="0.6"/>
    <rect x="78" y="62" width="8" height="12" fill="#f59e0b" opacity="0.5"/>
    <text x="95" y="68" fill="#f59e0b" font-family="monospace" font-size="10" opacity="0.8">+24%</text>
  </g>

  <!-- Vertical connectors (shifted from x=695→95, x=880→280) -->
  <line x1="95" y1="180" x2="95" y2="228" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowPipeline)"/>
  <line x1="280" y1="180" x2="280" y2="228" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowPipeline)"/>

  <!-- Result banner (shifted from x=630 to x=30) -->
  <g transform="translate(30, 360)">
    <rect x="0" y="0" width="315" height="60" fill="#0e1a24" stroke="#f59e0b" stroke-width="1" rx="8" opacity="0.8"/>
    <text x="157" y="25" fill="#aaa" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">SYSTEMS THAT WORK TOGETHER</text>
    <text x="157" y="45" fill="#f59e0b" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Automated. Accurate. Always Current.</text>
  </g>

  <!-- Dashed connectors to banner (shifted) -->
  <line x1="95" y1="310" x2="95" y2="358" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="280" y1="310" x2="280" y2="358" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Left edge indicator / transition hint -->
  <line x1="10" y1="40" x2="10" y2="560" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
</svg>